name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc nasm

      - name: Build the compiler
        run: bash build.sh

      - name: Compile sample program
        run: ./build/unn ./examples/print.unn ci_print_demo

      - name: Run sample program
        run: ./ci_print_demo
