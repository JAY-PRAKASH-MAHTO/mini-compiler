name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc nasm

      - name: Build the compiler
        run: bash build.sh

      - name: Compile and run sample programs
        run: |
          set -eu
          ./build/bhasacore ./examples/hello.hin ci_hello_demo
          ./ci_hello_demo
          ./build/bhasacore ./examples/full_demo.hin ci_full_demo
          ./ci_full_demo
          ./build/bhasacore ./examples/optimizations.hin ci_optimizations_demo
          ./ci_optimizations_demo
          ./build/bhasacore ./examples/switch_stmt.hin ci_switch_demo
          ./ci_switch_demo

      - name: Verify intentional diagnostic sample fails
        run: |
          set -eu
          if ./build/bhasacore ./examples/error_undecl.hin ci_error_undecl_demo > ci_error_undecl.log 2>&1; then
            echo "Expected examples/error_undecl.hin to fail, but it succeeded."
            cat ci_error_undecl.log
            exit 1
          fi
          cat ci_error_undecl.log
