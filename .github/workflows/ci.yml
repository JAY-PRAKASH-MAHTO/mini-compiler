name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc nasm

      - name: Build the compiler
        run: bash build.sh

      - name: Compile hello sample program
        run: ./build/bhasacore ./examples/hello.hin ci_hello_demo

      - name: Run hello sample program
        run: ./ci_hello_demo

      - name: Compile full sample program
        run: ./build/bhasacore ./examples/full_demo.hin ci_full_demo

      - name: Run full sample program
        run: ./ci_full_demo
